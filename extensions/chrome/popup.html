<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 240px;
      font-family: system-ui, sans-serif;
      background: #0d0d1a;
      color: #e2e8f0;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px;
      border-bottom: 1px solid #1e1e3f;
    }
    .logo { font-size: 20px; }
    .title { font-size: 14px; font-weight: 700; color: #a5b4fc; }
    .subtitle { font-size: 11px; color: #64748b; }
    .body { padding: 14px 16px; }
    .btn {
      width: 100%;
      padding: 10px;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
      margin-bottom: 10px;
    }
    .btn:hover { background: #4f46e5; }
    .btn.active { background: #ef4444; }
    .btn.active:hover { background: #dc2626; }
    .tip {
      font-size: 11px;
      color: #475569;
      line-height: 1.5;
    }
    .tip code {
      background: #1e1e3f;
      padding: 1px 5px;
      border-radius: 3px;
      color: #a5b4fc;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 12px;
      font-size: 12px;
    }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #64748b; }
    .dot.online { background: #10b981; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">🎯</div>
    <div>
      <div class="title">yumyum_pickr</div>
      <div class="subtitle">Element picker for AI chat</div>
    </div>
  </div>
  <div class="body">
    <div class="status">
      <div class="dot" id="dot"></div>
      <span id="status-text">Checking VSCode Extension...</span>
    </div>
    <button class="btn" id="toggle-btn">🎯 Pick Element</button>
    <div class="tip">
      Shortcut: <code>Alt+P</code><br>
      After picking, use <code>get_selected_element</code> in AI chat.
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
